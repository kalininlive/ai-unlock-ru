    <main>
      <div id="main-view" style="display: flex; flex-direction: column; gap: 12px;">
        <div class="proxy-status glass-panel">
          <div class="status-header">
            <span id="label-status" data-i18n="status">Статус:</span>
            <div id="status-indicator" class="indicator"></div>
            <span id="status-text" data-i18n="searching">Поиск...</span>

          <div class="main-toggle">
            <label class="switch">

        <div class="services-list glass-panel">

          <div class="input-group">
            <input type="text" id="custom-domain" placeholder="example.com" class="glass-input">

        </div>
        <div class="password-wrapper" style="margin-bottom: 0;">
          <input type="password" id="proxy-string" placeholder="IP:PORT или IP:PORT:USER:PASS" class="glass-input">
          <button id="toggle-password" class="toggle-password">
            <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
